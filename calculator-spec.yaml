name: "Canadian Take-Home Pay Calculator"
slug: "take-home-pay-canada"
repo_name: "simplekit-take-home-pay-canada"
subdomain: "take-home-pay-canada"

seo:
  page_title: "Canadian Take-Home Pay Calculator | Salary, After-Tax Income & Province Comparison"
  meta_description: "Estimate salary after tax in Canada with a guided take-home pay calculator. Compare provinces and territories, see federal and provincial tax, CPP, EI, and when payroll deductions may stop for the year."
  h1: "Canadian Take-Home Pay Calculator"

calculator:
  description: "A guided Canadian salary calculator that starts with monthly gross pay and estimates annual and monthly take-home income for employees in every province and territory. The tool annualizes monthly salary, applies federal income tax plus the selected provincial or territorial tax rules, estimates CPP and EI contributions, and then converts the result back into clear monthly planning numbers. It also estimates when CPP and EI may be fully paid for the year under a steady salary assumption, explains why net pay can change after annual maximums are reached, and includes a province comparison mode that reuses the same salary and tax-year assumptions across jurisdictions."
  formula_notes: "Use a tax-year-first architecture so yearly updates can be handled by swapping data rather than rewriting logic. Monthly gross salary should be annualized to estimated annual employment income, then run through separate federal and provincial or territorial tax tables stored by tax year. CPP and EI should use centralized annual constants by tax year, including contribution rates, exemptions, insurable or pensionable earnings limits, and annual maximum employee contributions. Quebec-specific payroll distinctions should be handled through yearly jurisdiction data rather than hard-coded branching wherever possible. After annual tax and contribution estimates are calculated, convert totals back to monthly values for the main result. Paid-up month estimates for CPP and EI should assume consistent monthly salary and identify the approximate calendar month when the annual employee maximum would be reached, or clearly state when the maximum would not be reached within the year. Province comparison should reuse the same annual salary input, tax year, and core rule tables across all provinces and territories so maintenance stays centralized and future annual updates remain simple."

inputs:
  - id: "tax_year"
    label: "Tax year"
    type: "select"
    required: true
    step: 1
    default: "2026"
    options:
      - "2026"
      - "2025"
    help_text: "Start with the tax year so the calculator can load the right federal, provincial, CPP, and EI rules. This makes annual updates easier and helps keep your estimate aligned with the correct thresholds and rates."
  - id: "province_or_territory"
    label: "Province or territory"
    type: "select"
    required: true
    step: 2
    default: "Ontario"
    options:
      - "Alberta"
      - "British Columbia"
      - "Manitoba"
      - "New Brunswick"
      - "Newfoundland and Labrador"
      - "Northwest Territories"
      - "Nova Scotia"
      - "Nunavut"
      - "Ontario"
      - "Prince Edward Island"
      - "Quebec"
      - "Saskatchewan"
      - "Yukon"
    help_text: "Your province or territory affects income tax and some payroll assumptions, so it has a real impact on estimated take-home pay. Keep this step simple and explain that location changes more than just one tax rate."
  - id: "monthly_salary"
    label: "Monthly gross salary"
    type: "currency"
    required: true
    step: 3
    placeholder: "5000"
    min: 0
    help_text: "Enter your gross salary before deductions. The calculator uses this monthly amount to estimate annual income first, then works back to monthly deductions and net pay so the result is easier to compare across provinces."
  - id: "include_cpp"
    label: "Include CPP contributions"
    type: "toggle"
    required: true
    step: 4
    default: true
    help_text: "Leave this on for most salaried employees. This optional assumption review keeps the main flow simple while still letting users understand what is included in the estimate."
  - id: "include_ei"
    label: "Include EI premiums"
    type: "toggle"
    required: true
    step: 4
    default: true
    help_text: "Leave this on unless EI does not apply to your pay. Showing this as a simple assumption helps beginners understand why payroll deductions may differ from one situation to another."
  - id: "compare_all_provinces"
    label: "Compare all provinces and territories"
    type: "toggle"
    required: false
    step: 8
    default: false
    help_text: "Turn this on to see how the same salary and tax year look across Canada. Frame this as an exploratory comparison view, not a recommendation engine."

