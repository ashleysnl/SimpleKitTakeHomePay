content:
  intro: "Use this guided Canadian take-home pay calculator to estimate how much of your monthly salary you may keep after federal tax, provincial or territorial tax, CPP, and EI. The experience should feel calm and progressive: start with the tax year, choose where you live, enter monthly salary, review a small set of payroll assumptions, and then see a clear take-home pay estimate before opening deeper breakdowns. Along the way, explain in plain English why gross salary is not the same as net pay, why province matters, and why some payroll deductions can stop later in the year once annual maximums are reached."
  result_explanation: "Your result should surface the monthly take-home estimate first, then show the annual view and deduction breakdown after the main answer. Explain that the calculator annualizes monthly salary to estimate yearly taxable income, applies federal and provincial or territorial rules for the selected tax year, and then converts the result back into practical monthly numbers. Clarify that CPP and EI are based on annual contribution limits, so if your salary is steady enough to reach those maximums, those deductions may stop later in the year and your net pay may increase at that point. If the annual maximum would not be reached, say so clearly. The paid-up month estimate is useful for budgeting because it helps users understand when their paycheque may change. In comparison mode, explain that the same salary can lead to different estimated take-home pay across provinces and territories because tax systems differ. Keep reminding users that this is a planning estimate only and exact payroll results may vary because of payroll frequency, bonuses, commissions, taxable benefits, employer setup, and Quebec-specific payroll treatment."

faq:
  - question: "What is take-home pay?"
    answer: "Take-home pay is the amount you keep after payroll deductions are taken off your gross salary. In this calculator, that usually means federal income tax, provincial or territorial income tax, CPP contributions, and EI premiums."
  - question: "Why is my take-home pay different in each province?"
    answer: "Federal tax rules apply across Canada, but each province and territory has its own income tax system. That means the same salary can produce different estimated deductions and net pay depending on where you live."
  - question: "Why do you start with monthly salary?"
    answer: "Monthly salary is a practical number for real-life planning, but tax and payroll rules are usually defined on an annual basis. The calculator first annualizes your monthly salary, estimates yearly deductions, and then turns the result back into monthly take-home pay."
  - question: "Does CPP stop during the year?"
    answer: "It can. CPP contributions are based on annual pensionable earnings and annual maximum employee contributions for the selected tax year. If your salary is high enough, you may fully pay your CPP amount before year-end, and that part of the deduction may stop after that point."
  - question: "Does EI stop during the year?"
    answer: "It can. EI premiums also have annual limits. If your salary is high enough to reach the annual employee maximum before December, EI deductions may stop for the rest of the year."
  - question: "How do you estimate when CPP and EI are paid up?"
    answer: "The calculator assumes your monthly salary stays consistent throughout the year. It adds estimated CPP and EI contributions month by month using the selected tax-year rules and shows the approximate month when each annual maximum would be reached, or tells you if the maximum is not reached."
  - question: "Why can my paycheck increase later in the year?"
    answer: "If CPP or EI hit their annual employee maximum during the year, those deductions may no longer come off later pay periods. That can increase your net pay even if your gross salary stays the same."
  - question: "Is this calculator accurate for Quebec?"
    answer: "It should be useful for planning, but Quebec payroll treatment can differ in practice and should be handled through jurisdiction-specific yearly data. Use the result as an estimate and confirm exact amounts with Revenu Quebec, the CRA, or your payroll provider."
  - question: "Is this calculator only for salary employees?"
    answer: "It is designed mainly as a salary-based payroll estimator for employees with steady monthly income. It is less reliable for self-employment income, irregular earnings, large bonuses, commissions, or unusual payroll setups."
  - question: "Can I compare provinces with the same salary?"
    answer: "Yes. The comparison view is designed to reuse the same salary and tax year across all provinces and territories so you can see how location affects estimated deductions and net pay."
  - question: "Is this calculator using the current year's tax brackets?"
    answer: "The calculator should be built around a tax year input and yearly rule tables. That makes it easier to support the current year, retain prior years, and update future years by replacing data files rather than rewriting the logic."

